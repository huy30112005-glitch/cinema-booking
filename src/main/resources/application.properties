spring.application.name=cinema-booking

# Ket noi QL_RAP_PHIM bang tai khoan sa
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=QL_RAP_PHIM;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456

# Cau hinh Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# Đổi cổng sang 8081 để né cái project bị treo lúc nãy
server.port=8081

# MoMo payment. Set momo.enabled=true after you fill real/sandbox credentials.
momo.enabled=false
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.partner-code=YOUR_PARTNER_CODE
momo.access-key=YOUR_ACCESS_KEY
momo.secret-key=YOUR_SECRET_KEY
momo.request-type=captureWallet
momo.redirect-url=
momo.ipn-url=
