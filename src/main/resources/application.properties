spring.application.name=cinema-booking

# Ket noi database. Tren Render/Neon co the dung DB_URL hoac DATABASE_URL.
spring.datasource.url=${DB_URL:${DATABASE_URL:}}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Cau hinh Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Đổi cổng sang 8081 để né cái project bị treo lúc nãy
server.port=${PORT:8081}
server.address=0.0.0.0

# MoMo payment. Set momo.enabled=true after you fill real/sandbox credentials.
momo.enabled=false
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.partner-code=YOUR_PARTNER_CODE
momo.access-key=YOUR_ACCESS_KEY
momo.secret-key=YOUR_SECRET_KEY
momo.request-type=captureWallet
momo.redirect-url=
momo.ipn-url=
